        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #1a1a1a;
        }

        /* 背景轮播 */
        .bg-slider { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-slider img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

            filter: brightness(0.6) blur(2px);
        }
        .bg-slider img.active { opacity: 1; }

        /* 主容器 */
        .player-container {
            width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
            transition: all 0.5s ease;
            z-index: 10;
        }
        .player-container.mv-active {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .header { text-align: center; color: rgba(255,255,255,0.9); margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 300; letter-spacing: 8px; }

        /* 唱片封面 */
        .album-section { position: relative; width: 260px; height: 260px; margin: 0 auto 30px; }
        .album-cover {
            width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: rotate 20s linear infinite; animation-play-state: paused;
        }
        .album-cover.playing { animation-play-state: running; }
        .album-cover img { width: 100%; height: 100%; object-fit: cover; }
        .album-cover::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 60px; height: 60px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song-info { text-align: center; color: white; margin-bottom: 25px; }
        .song-title { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
        .song-artist { font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }

        /* 进度条 */
        .progress-section { margin-bottom: 25px; }
        .progress-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 2px; cursor: pointer; position: relative; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #a8edea, #fed6e3);
            width: 0%; border-radius: 2px; transition: width 0.1s linear; position: relative;
        }
        .progress-fill::after {
            content: ''; position: absolute; right: -6px; top: 50%;
            transform: translateY(-50%); width: 12px; height: 12px;
            background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        .time-display { display: flex; justify-content: space-between; color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 8px; }

        /* 控制按钮 */
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 25px; }
        .control-btn { 
            background: rgba(255,255,255,0.15); 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s;

            height: 50px;
            border-radius: 50%;

            justify-content: center;

        .control-btn:hover {

        .mode-btn, .mv-btn, .list-btn, .volume-btn {

        /* ==================== MV 全屏模式 ==================== */
        .mv-mode {

        /* MV 视频层 */
        .mv-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
        }
        .mv-video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;

        }

        /* 光晕效果 */
        .mv-glow {

        /* MV 内容区 */

        /* 模拟歌词 */
        .mv-lyrics {

            padding: 25px 40px; z-index: 10;
        }
        .mv-exit {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 10px 24px; border-radius: 30px;
            cursor: pointer; font-size: 14px; letter-spacing: 2px;

        }
        .mv-exit:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
        .mv-badge {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);

            width: 4px;

        }
    </style>

            });
            
            // 更新背景

            });
            bgIndex = index;

            }

            progressFill.style.width = '0%';
            mvProgress.style.width = '0%';

                    playBtn.textContent = '▶';
                    albumCover.classList.remove('playing');
                    visualizer.classList.remove('active');
                });
            } else {
                playBtn.textContent = '▶';
                albumCover.classList.remove('playing');
                visualizer.classList.remove('active');
                audio.pause();
            }
        }

        function playPrev() {
            if (currentMode === 1) {
                // 随机模式
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * songs.length);
                } while (newIndex === currentIndex && songs.length > 1);
                currentIndex = newIndex;
            } else {
                // 上一首
                currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            }
            loadSong(currentIndex);
        }

        function playNext() {
            if (currentMode === 1) {
                // 随机模式
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * songs.length);
                } while (newIndex === currentIndex && songs.length > 1);
                currentIndex = newIndex;
            } else {
                // 下一首
                currentIndex = (currentIndex + 1) % songs.length;
            }
            loadSong(currentIndex);
        }

        function handleSongEnd() {
            if (currentMode === 0) {
                // 单曲循环
                audio.currentTime = 0;
                audio.play();
            } else {
                playNext();
            }
        }

        // ==================== 进度条控制 ====================
        function updateProgress() {
            if (!audio.duration) return;
            
            const progress = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = progress + '%';
            mvProgress.style.width = progress + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            
            // 更新歌词高亮
            if (isMV) updateLyricsHighlight(audio.currentTime, audio.duration);
            
            // 可视化动画
            if (isPlaying) animateVisualizer();
        }

        function seek(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const time = percent * audio.duration;
            audio.currentTime = time;
            progressFill.style.width = (percent * 100) + '%';
        }

        // ==================== 音量控制 ====================
        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                lastVolume = audio.volume;
                audio.volume = 0;
                muteBtn.textContent = '🔇';
                volumeFill.style.width = '0%';
            } else {
                audio.volume = lastVolume;
                muteBtn.textContent = '🔊';
                volumeFill.style.width = (lastVolume * 100) + '%';
            }
        }

        function setVolume(e) {
            const rect = volumeSlider.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            
            audio.volume = percent;
            lastVolume = percent;
            volumeFill.style.width = (percent * 100) + '%';
            
            if (percent === 0) {
                isMuted = true;
                muteBtn.textContent = '🔇';
            } else {
                isMuted = false;
                muteBtn.textContent = '🔊';
            }
        }

        // ==================== 播放模式切换 ====================
        function toggleMode() {
            currentMode = (currentMode + 1) % 3;
            modeBtn.textContent = modes[currentMode].icon;
            modeBtn.title = modes[currentMode].name;
        }

        // ==================== 播放列表 ====================
        function togglePlaylist() {
            playlist.classList.toggle('show');
        }

        function selectSong(e) {
            const item = e.currentTarget;
            const index = parseInt(item.dataset.index);
            currentIndex = index;
            loadSong(currentIndex);
            if (!isPlaying) togglePlay();
            playlist.classList.remove('show');
        }

        // ==================== MV 模式 ====================
        function enterMV() {
            isMV = true;
            mvMode.classList.add('active');
            playerContainer.classList.add('mv-active');
            updateMV();
            resizeCanvas();
            initParticles();
            animateParticles();
            if (!isPlaying) togglePlay();
        }

        function exitMV() {
            isMV = false;
            mvMode.classList.remove('active');
            playerContainer.classList.remove('mv-active');
            mvVideo.pause();
        }

        function updateMV() {
            const song = songs[currentIndex];
            mvAlbumImg.src = song.album;
            mvTitle.textContent = song.title;
            mvArtist.textContent = song.artist;
            
            // 切换对应 MV 视频（如果有视频文件）
            if (mvCurrentVideoIndex !== currentIndex) {
                mvCurrentVideoIndex = currentIndex;
                mvVideo.src = mvSources[currentIndex];
                if (isMV) {
                    mvVideo.play().catch(e => console.log('Video autoplay prevented:', e));
                }
            }
            
            updateLyrics();
        }

        function updateLyrics() {
            const lines = lyricsList[currentIndex];
            mvLyrics.innerHTML = lines.map((line, i) => 
                `<div class="lyrics-line ${i===1?'active':''}" data-index="${i}">${line}</div>`
            ).join('');
        }

        function updateLyricsHighlight(currentSec, totalSec) {
            const lines = mvLyrics.querySelectorAll('.lyrics-line');
            const index = Math.floor((currentSec / totalSec) * lines.length) % lines.length;
            lines.forEach((line, i) => {
                line.classList.toggle('active', i === index);
            });
        }

        // ==================== 粒子系统 ====================
        function resizeCanvas() {
            mvCanvas.width = window.innerWidth;
            mvCanvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * mvCanvas.width,
                    y: Math.random() * mvCanvas.height,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animateParticles() {
            if (!isMV) return;
            ctx.clearRect(0, 0, mvCanvas.width, mvCanvas.height);
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = mvCanvas.width;
                if (p.x > mvCanvas.width) p.x = 0;
                if (p.y < 0) p.y = mvCanvas.height;
                if (p.y > mvCanvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(168, 237, 234, ${p.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        // ==================== 可视化动画 ====================
        function animateVisualizer() {
            visualizerBars.forEach(bar => {
                const height = Math.random() * 20 + 5;
                bar.style.height = height + 'px';
            });
        }

        // ==================== 工具函数 ====================
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ==================== 事件绑定 ====================
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', playPrev);
        nextBtn.addEventListener('click', playNext);
        modeBtn.addEventListener('click', toggleMode);
        listBtn.addEventListener('click', togglePlaylist);
        muteBtn.addEventListener('click', toggleMute);
        volumeSlider.addEventListener('click', setVolume);
        progressBar.addEventListener('click', seek);
        mvBtn.addEventListener('click', enterMV);
        mvExit.addEventListener('click', exitMV);
        
        playlistItems.forEach(item => {
            item.addEventListener('click', selectSong);
        });

        // 点击外部关闭播放列表
        document.addEventListener('click', (e) => {
            if (!playlist.contains(e.target) && !listBtn.contains(e.target)) {
                playlist.classList.remove('show');
            }
        });

        // ESC 退出 MV
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isMV) exitMV();
        });

        // 窗口大小改变
        window.addEventListener('resize', () => {
            if (isMV) resizeCanvas();
        });

        // 背景轮播（每5秒切换）
        setInterval(() => {
            bgImages[bgIndex].classList.remove('active');
            bgIndex = (bgIndex + 1) % bgImages.length;
            bgImages[bgIndex].classList.add('active');
        }, 5000);

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
